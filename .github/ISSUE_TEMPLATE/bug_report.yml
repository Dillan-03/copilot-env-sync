name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: "A clear description of the bug."
      placeholder: "What happened?"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "Minimal steps to reproduce the bug."
      placeholder: |
        1. Do this
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: shell-info
    attributes:
      label: Shell and environment
      description: "Which shell are you using? Any relevant env config (oh-my-zsh, starship, tmux, etc.)?"
      placeholder: "e.g. zsh with starship prompt"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recordings
      description: "If applicable, add screenshots or recordings to help explain the problem."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "Anything else that might be relevant (other apps running, display setup, accessibility features, etc.)."
    validations:
      required: false
